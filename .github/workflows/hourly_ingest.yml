name: Hourly Real-Time Data Ingestion

on:
  schedule:
    - cron: '0 * * * *' # Run at the beginning of every hour
  workflow_dispatch: # Enable manual run trigger

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Fetch Real-Time Data
        env:
          WAQI_API_TOKEN: ${{ secrets.WAQI_API_TOKEN }}
        run: python Dashboard/ingest_realtime.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Dashboard/data/realtime_metrics.json
          git diff-index --quiet HEAD || (git commit -m "chore: update hourly real-time environmental metrics" && git push)
